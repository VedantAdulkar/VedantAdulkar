<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
    <rect width="800" height="180" fill="#0d1117" rx="6" />
    <style>
        .title { font: 600 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
        .subtitle { font: 400 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; opacity: 0.8; }
        .accent { fill: #58a6ff; }
        .text { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
    </style>
    
    <g transform="translate(40, 60)">
        <text class="title" x="0" y="0">Vedant Adulkar</text>
        <text class="subtitle" x="0" y="30">AI &amp; Machine Learning Engineer | Generative AI Enthusiast</text>
        <line x1="0" y1="50" x2="600" y2="50" stroke="#58a6ff" stroke-width="2" />
        <text class="text" x="0" y="80">Transforming data into intelligent systems.</text>
    </g>
    
</svg>