<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,2"/>
        </pattern>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#30363d" opacity="0.5"/>
        </pattern>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b392f0;stop-opacity:1" />
        </linearGradient>
        <clipPath id="type1">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="0.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type2">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="1.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type3">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="1s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type4">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type5">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="3.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type6">
            <rect x="0" y="0" width="0" height="200">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="4.1s" fill="freeze" />
            </rect>
        </clipPath>
    </defs>
    <rect width="800" height="200" fill="#0d1117" rx="8" />
    <rect width="800" height="200" fill="url(#grid)" rx="8" />
    <style>
        .title { font: 700 28px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; letter-spacing: -0.5px; }
        .subtitle { font: 400 16px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.7; }
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.6; }
        .accent { fill: #58a6ff; font-weight: 600; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
        .text { font: 400 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
        .box { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6px; }
    </style>
    
    <rect x="0" y="0" width="10" height="180" fill="url(#grad1)" rx="4"/>
    
    <!-- Laser Sweeper Animation -->
    <line x1="0" y1="0" x2="800" y2="0" stroke="#58a6ff" stroke-width="2" opacity="0.2">
        <animate attributeName="y1" values="0; 200; 0" dur="4s" repeatCount="indefinite" />
        <animate attributeName="y2" values="0; 200; 0" dur="4s" repeatCount="indefinite" />
    </line>

    <g transform="translate(50, 50)">
        <text class="title" x="0" y="0">VEDANT_ADULKAR</text>
        <text class="mono" x="0" y="30" clip-path="url(#type1)">&gt; <tspan fill="#58a6ff">sys.role</tspan> = "Data / AI Engineer"</text>
        <text class="mono" x="0" y="55" clip-path="url(#type2)">&gt; <tspan fill="#58a6ff">sys.specialty</tspan> = ["LLMs", "RAG", "Enterprise AI Systems"]</text>
        <text class="mono" x="0" y="80" clip-path="url(#type3)">&gt; <tspan fill="#58a6ff">sys.status</tspan> = "Infusing intelligent AI technologies for global clients."<tspan fill="#58a6ff"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />█</tspan></text>
        
        <!-- Live Links Section popping up at 3.5s -->
        <g transform="translate(0, 115)" opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.5s" fill="freeze" />
            <animateTransform attributeName="transform" type="translate" from="0 125" to="0 115" dur="0.5s" begin="3.5s" fill="freeze" />
            <rect class="box" x="0" y="-20" width="400" height="30" fill="#238636" fill-opacity="0.1" stroke="#238636"/>
            <circle cx="15" cy="-5" r="4" fill="#238636">
                <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <text class="mono" x="28" y="0">Live Profile: <tspan class="accent">profile-site-2-0.onrender.com</tspan></text>
        </g>
    </g>
    <rect x="700" y="20" width="80" height="140" fill="url(#dots)"/>
    
    <rect width="800" height="200" fill="none" stroke="#30363d" stroke-width="2" rx="8" />
</svg>