<svg xmlns="http://www.w3.org/2000/svg" width="380" height="95" viewBox="0 0 380 95">
    <rect width="380" height="95" fill="#0d1117" rx="8" />
    
    <style>
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.6; }
        .accent { fill: #58a6ff; font-weight: 600; }
    </style>
    
    <g transform="translate(15, 15)">
        <circle cx="15" cy="15" r="4" fill="#58a6ff"/>
        <text class="mono" x="30" y="20"><tspan class="accent">Voice Assistant</tspan></text>
        <text class="mono-small" x="30" y="45">Intelligent agent via Google Speech &amp; OpenAI API.</text>
        <text class="mono-small" x="30" y="65">Stack: Python / APIs</text>
    </g>
    <rect width="380" height="95" fill="none" stroke="#30363d" stroke-width="1" rx="8" />
</svg>