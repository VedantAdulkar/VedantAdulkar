<svg xmlns="http://www.w3.org/2000/svg" width="395" height="95" viewBox="0 0 395 95">
    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="6.0s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.6s" begin="6.0s" fill="freeze" />
        <rect width="395" height="95" fill="#0d1117" rx="8" />
        <rect width="395" height="95" fill="#238636" fill-opacity="0.05" rx="8" />
        <style>
            .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; }
            .mono-small { font: 400 11.5px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.6; }
            .accent { fill: #58a6ff; font-weight: 600; }
        </style>
        
    <g transform="translate(10, 10)">
        <circle cx="15" cy="15" r="5" fill="#238636">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text class="mono" x="30" y="20"><tspan class="accent">Profile-site-2.0</tspan> [LIVE]</text>
        <text class="mono-small" x="30" y="45">Personal developer portfolio web application.</text>
        <text class="mono-small" x="30" y="65" fill="#238636">profile-site-2-0.onrender.com</text>
    </g>
        <rect width="395" height="95" fill="none" stroke="#238636" stroke-width="2" rx="8" />
    </g>
</svg>