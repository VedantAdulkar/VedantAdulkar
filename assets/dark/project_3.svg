<svg xmlns="http://www.w3.org/2000/svg" width="395" height="95" viewBox="0 0 395 95">
    <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="5.7s" fill="freeze" />
        <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.6s" begin="5.7s" fill="freeze" />
        <rect width="395" height="95" fill="#0d1117" rx="8" />
        
        <style>
            .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; }
            .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.6; }
            .accent { fill: #58a6ff; font-weight: 600; }
        </style>
        
    <g transform="translate(15, 15)">
        <circle cx="15" cy="15" r="4" fill="#58a6ff"/>
        <text class="mono" x="30" y="20"><tspan class="accent">Autonomous Drone GCS</tspan></text>
        <text class="mono-small" x="30" y="45">Ground Control System for Pixhawk drones.</text>
        <text class="mono-small" x="30" y="65">Stack: Python / OpenCV</text>
    </g>
        <rect width="395" height="95" fill="none" stroke="#30363d" stroke-width="1" rx="8" />
    </g>
</svg>