<svg xmlns="http://www.w3.org/2000/svg" width="390" height="115" viewBox="0 0 390 115">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,2"/>
        </pattern>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#30363d" opacity="0.5"/>
        </pattern>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b392f0;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="390" height="115" fill="#0d1117" rx="8" />
    <rect width="390" height="115" fill="url(#grid)" rx="8" />
    <style>
        .title { font: 700 28px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; letter-spacing: -0.5px; }
        .subtitle { font: 400 16px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.7; }
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #c9d1d9; opacity: 0.6; }
        .accent { fill: #58a6ff; font-weight: 600; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
        .text { font: 400 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
        .box { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6px; }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
    
    <g transform="translate(15, 15)" class="animate-fade delay-1">
        <rect class="box" x="0" y="0" width="360" height="85"/>
        <circle cx="20" cy="25" r="4" fill="#58a6ff"/>
        <text class="mono" x="35" y="30"><tspan class="accent">DocQ</tspan></text>
        <text class="mono-small" x="35" y="50">All format summarizer (Image/PDF/Video) via AI.</text>
        <text class="mono-small" x="35" y="70">Stack: Python / ML / Flask</text>
    </g>
    <rect width="390" height="115" fill="none" stroke="#30363d" stroke-width="2" rx="8" />
</svg>