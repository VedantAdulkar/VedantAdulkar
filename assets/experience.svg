<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#e1e4e8" stroke-width="0.5" stroke-dasharray="2,2"/>
        </pattern>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#e1e4e8" opacity="0.5"/>
        </pattern>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0969da;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b392f0;stop-opacity:1" />
        </linearGradient>
        <clipPath id="typing">
            <rect x="0" y="0" width="0" height="300">
                <animate attributeName="width" from="0" to="800" dur="2s" begin="1.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="typingFast">
            <rect x="0" y="0" width="0" height="300">
                <animate attributeName="width" from="0" to="800" dur="1s" begin="0.5s" fill="freeze" />
            </rect>
        </clipPath>
    </defs>
    <rect width="800" height="300" fill="#ffffff" rx="8" />
    <rect width="800" height="300" fill="url(#grid)" rx="8" />
    <style>
        .title { font: 700 28px 'Fira Code', 'Courier New', monospace; fill: #24292f; letter-spacing: -0.5px; }
        .subtitle { font: 400 16px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.7; }
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #24292f; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.6; }
        .accent { fill: #0969da; font-weight: 600; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #0969da; }
        .text { font: 400 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #24292f; }
        .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 1; rx: 6px; }
    </style>
    
    <g transform="translate(30, 40)">
        <text class="title" x="0" y="0">02 — telemetry_&amp;_timeline</text>
        <line x1="0" y1="15" x2="740" y2="15" stroke="#0969da" stroke-width="2" stroke-opacity="0.5"/>
        
        <!-- Timeline Line -->
        <line x1="40" y1="60" x2="40" y2="280" stroke="#e1e4e8" stroke-width="2" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite" />
        </line>
        
        <!-- ICRA Analytics pops up at 3.5s -->
        <g transform="translate(40, 80)" opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.5s" fill="freeze" />
            <animateTransform attributeName="transform" type="translate" from="40 90" to="40 80" dur="0.5s" begin="3.5s" fill="freeze" />
            <circle cx="0" cy="0" r="6" fill="#0969da" />
            <circle cx="0" cy="0" r="10" fill="none" stroke="#0969da" stroke-width="1.5">
                <animate attributeName="r" values="8;16;8" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
            </circle>
            <text class="mono accent" x="25" y="-5">Data / AI Engineer @ ICRA Analytics - Fintellix</text>
            <text class="mono-small" x="25" y="15">1+ Years • Building Enterprise AI Systems • LLMs • RAG Models</text>
            
            <rect class="box" x="20" y="25" width="650" height="30" fill="#0969da" fill-opacity="0.05" stroke-opacity="0"/>
            <text class="mono-small" x="30" y="45">&gt; Spearheading the implementation of generative AI architectures for major clients.</text>
        </g>

        <!-- Earlier Work / Evolution pops up at 4.2s -->
        <g transform="translate(40, 180)" opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.2s" fill="freeze" />
            <animateTransform attributeName="transform" type="translate" from="40 190" to="40 180" dur="0.5s" begin="4.2s" fill="freeze" />
            <circle cx="0" cy="0" r="5" fill="#e1e4e8" />
            <text class="mono" x="25" y="-5" fill="#e1e4e8">Project Evolution &amp; Foundation</text>
            <text class="mono-small" x="25" y="15">Developed multiple AI pipelines including DocQ summarizer &amp; autonomous drones.</text>
            <text class="mono-small" x="25" y="35">Expertise built across Python, ML Algorithms, and APIs.</text>
        </g>
    </g>
    
    <rect width="800" height="300" fill="none" stroke="#e1e4e8" stroke-width="2" rx="8" />
</svg>