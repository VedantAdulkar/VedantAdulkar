<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#e1e4e8" stroke-width="0.5" stroke-dasharray="2,2"/>
        </pattern>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#e1e4e8" opacity="0.5"/>
        </pattern>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0969da;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b392f0;stop-opacity:1" />
        </linearGradient>
        <clipPath id="type1">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="0.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type2">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="1.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type3">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="1s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="pop1">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="0.01s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="pop2">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="0.01s" begin="2.7s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="pop3">
            <rect x="0" y="0" width="0" height="220">
                <animate attributeName="width" from="0" to="800" dur="0.01s" begin="2.9s" fill="freeze" />
            </rect>
        </clipPath>
    </defs>
    <rect width="800" height="220" fill="#ffffff" rx="8" />
    <rect width="800" height="220" fill="url(#grid)" rx="8" />
    <style>
        .title { font: 700 28px 'Fira Code', 'Courier New', monospace; fill: #24292f; letter-spacing: -0.5px; }
        .subtitle { font: 400 16px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.7; }
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #24292f; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.6; }
        .accent { fill: #0969da; font-weight: 600; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #0969da; }
        .text { font: 400 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #24292f; }
        .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 1; rx: 6px; }
    </style>
    
    <g transform="translate(30, 40)">
        <text class="title" x="0" y="0">03 — technical_stack</text>
        <line x1="0" y1="15" x2="740" y2="15" stroke="#0969da" stroke-width="2" stroke-opacity="0.5"/>
        
        <g transform="translate(0, 40)">
            <!-- Column 1 pops up at 4.5s -->
            <g opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze" />
                <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.5s" begin="4.5s" fill="freeze" />
                <rect class="box" x="0" y="0" width="230" height="120"/>
                <g>
                    <text class="mono accent" x="15" y="25">AI &amp; Models</text>
                    <text class="mono" x="15" y="50">LLMs • RAG</text>
                    <text class="mono" x="15" y="70">TensorFlow • PyTorch</text>
                    <text class="mono" x="15" y="90">Scikit-learn • Keras</text>
                    <text class="mono" x="15" y="110">OpenAI API</text>
                </g>
            </g>

            <!-- Column 2 pops up at 4.8s -->
            <g opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.8s" fill="freeze" />
                <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.5s" begin="4.8s" fill="freeze" />
                <rect class="box" x="250" y="0" width="230" height="120"/>
                <g>
                    <text class="mono accent" x="265" y="25">Core Engineering</text>
                    <text class="mono" x="265" y="50">Python • SQL</text>
                    <text class="mono" x="265" y="70">FastAPI • Flask</text>
                    <text class="mono" x="265" y="90">LangChain • LlamaIndex</text>
                    <text class="mono" x="265" y="110">Vector Databases</text>
                </g>
            </g>

            <!-- Column 3 pops up at 5.1s -->
            <g opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="5.1s" fill="freeze" />
                <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.5s" begin="5.1s" fill="freeze" />
                <rect class="box" x="500" y="0" width="240" height="120"/>
                <g>
                    <text class="mono accent" x="515" y="25">Data &amp; Cloud</text>
                    <text class="mono" x="515" y="50">AWS • Docker</text>
                    <text class="mono" x="515" y="70">PostgreSQL • MongoDB</text>
                    <text class="mono" x="515" y="90">Git • CI/CD Pipelines</text>
                    <text class="mono" x="515" y="110">Data Engineering</text>
                </g>
            </g>
        </g>
    </g>
    
    <rect width="800" height="220" fill="none" stroke="#e1e4e8" stroke-width="2" rx="8" />
</svg>