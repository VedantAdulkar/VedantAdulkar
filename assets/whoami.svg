<svg xmlns="http://www.w3.org/2000/svg" width="800" height="245" viewBox="0 0 800 245">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#e1e4e8" stroke-width="0.5" stroke-dasharray="2,2"/>
        </pattern>
        <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#e1e4e8" opacity="0.5"/>
        </pattern>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#0969da;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b392f0;stop-opacity:1" />
        </linearGradient>
        <clipPath id="type1">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="0.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type2">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="1.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type3">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="1s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type4">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="2.5s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type5">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="3.3s" fill="freeze" />
            </rect>
        </clipPath>
        <clipPath id="type6">
            <rect x="0" y="0" width="0" height="245">
                <animate attributeName="width" from="0" to="800" dur="0.8s" begin="4.1s" fill="freeze" />
            </rect>
        </clipPath>
    </defs>
    <rect width="800" height="245" fill="#ffffff" rx="8" />
    <rect width="800" height="245" fill="url(#grid)" rx="8" />
    <style>
        .title { font: 700 28px 'Fira Code', 'Courier New', monospace; fill: #24292f; letter-spacing: -0.5px; }
        .subtitle { font: 400 16px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.7; }
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #24292f; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.6; }
        .accent { fill: #0969da; font-weight: 600; }
        .highlight { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #0969da; }
        .text { font: 400 15px 'Segoe UI', Ubuntu, Sans-Serif; fill: #24292f; }
        .box { fill: #ffffff; stroke: #e1e4e8; stroke-width: 1; rx: 6px; }
    </style>
    
    <g transform="translate(30, 40)">
        <text class="title" x="0" y="0">01 — whoami</text>
        <line x1="0" y1="15" x2="740" y2="15" stroke="#0969da" stroke-width="2" stroke-opacity="0.5"/>
        
        <g transform="translate(20, 50)">
            <rect class="box" x="0" y="0" width="700" height="145" />
            <circle cx="20" cy="20" r="5" fill="#ff5f56"/>
            <circle cx="40" cy="20" r="5" fill="#ffbd2e"/>
            <circle cx="60" cy="20" r="5" fill="#27c93f"/>
            <line x1="0" y1="40" x2="700" y2="40" stroke="#30363d" stroke-width="1"/>
            
            <!-- Typewriter effect for command starts at 1.5s -->
            <text class="mono" x="20" y="65" clip-path="url(#type2)"><tspan class="accent">vedant@core</tspan>:~$ cat professional_summary.log</text>
            
            <!-- Output types out sequentially after command (2.5s) -->
            <text class="mono" x="20" y="90" clip-path="url(#type4)">Experienced Data/AI Engineer specializing in Large Language Models (LLMs) &amp; RAG.</text>
            <text class="mono" x="20" y="115" clip-path="url(#type5)">Architecting scalable AI infrastructure and delivering robust</text>
            <text class="mono" x="20" y="140" clip-path="url(#type6)">machine learning solutions for enterprise clients.<tspan fill="#0969da"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />█</tspan></text>
        </g>
    </g>
    
    <rect width="800" height="245" fill="none" stroke="#e1e4e8" stroke-width="2" rx="8" />
</svg>