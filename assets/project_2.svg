<svg xmlns="http://www.w3.org/2000/svg" width="380" height="95" viewBox="0 0 380 95">
    <rect width="380" height="95" fill="#ffffff" rx="8" />
    
    <style>
        .mono { font: 400 14px 'Fira Code', 'Courier New', monospace; fill: #24292f; }
        .mono-small { font: 400 12px 'Fira Code', 'Courier New', monospace; fill: #24292f; opacity: 0.6; }
        .accent { fill: #0969da; font-weight: 600; }
    </style>
    
    <g transform="translate(15, 15)">
        <circle cx="15" cy="15" r="4" fill="#0969da"/>
        <text class="mono" x="30" y="20"><tspan class="accent">DocQ</tspan></text>
        <text class="mono-small" x="30" y="45">All format summarizer (Image/PDF/Video) via AI.</text>
        <text class="mono-small" x="30" y="65">Stack: Python / ML / Flask</text>
    </g>
    <rect width="380" height="95" fill="none" stroke="#e1e4e8" stroke-width="1" rx="8" />
</svg>